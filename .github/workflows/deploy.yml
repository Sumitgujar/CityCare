# ── City Care Hospital — CI/CD Pipeline ─────────────────────────
# Trigger: Every push to the main branch
# Steps:   Build Docker image → Push to Docker Hub → Deploy to AWS EC2

name: Deploy to AWS EC2

on:
  push:
    branches:
      - main                          # Runs automatically on every git push to main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest            # GitHub's free Linux runner

    steps:

      # ── Step 1: Get the latest code ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Login to Docker Hub ──────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # Set in GitHub → Settings → Secrets
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 3: Build Docker image ───────────────────────────
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/citycare-hospital:latest .

      # ── Step 4: Push image to Docker Hub ─────────────────────
      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/citycare-hospital:latest

      # ── Step 5: SSH into EC2 and deploy ──────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}          # Your EC2 Public IP
          username: ${{ secrets.EC2_USER }}          # Usually "ubuntu"
          key:      ${{ secrets.EC2_SSH_KEY }}       # Your EC2 .pem private key content

          script: |
            # Pull latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/citycare-hospital:latest

            # Stop and remove old containers
            docker stop citycare-container || true

            # Start fresh containers with new image
            docker rm citycare-container || true

            # Clean up old unused images
            docker run -d \ -p 80:5000 \ --name citycare-container \ ${{ secrets.DOCKER_USERNAME }}/citycare-hospital:late

            echo "✅ Deployment complete!"
