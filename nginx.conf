# ── Nginx Configuration for City Care Hospital ──────────────────
# This acts as a reverse proxy:
# User → Port 80 (Nginx) → Port 5000 (Flask)

worker_processes 1;

events {
    worker_connections 1024;
}

http {

    # ── Logging ────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Performance ────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # ── Upstream: Flask App ────────────────────────────────────
    # "flask_app" is the Docker service name from docker-compose.yml
    # Docker automatically resolves this hostname inside the network
    upstream flask_app {
        server flask_app:5000;
    }

    # ── Server Block ───────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;          # Change to your domain or EC2 public IP

        # ── Forward all requests to Flask ──────────────────
        location / {
            proxy_pass         http://flask_app;

            # Pass real client info to Flask
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health check endpoint ───────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Block hidden files like .git, .env ─────────────
        location ~ /\. {
            deny all;
        }
    }
}
